synthetic_path: data/synthetic/wgan_gp.h5
held_out: [LPI-FMCW, LPI-polyphase]
augment_held_out_only: true
model:
  in_channels: 10
  seq_len: 64
  hidden: 64
  dilations: [1, 2, 4, 8]
  n_types: 8
  n_modes: 4
  dropout: 0.1
pdw:
  library_path: configs/temporal_cnn_elint/emitters.yaml
  emitters: null
  modes: null
  window: 64
  n_pulses: 256
  n_trains: 16
  normalize: true
  noise_std: 0.02
  drop_prob: 0.02
  spurious_prob: 0.01
  seed: 0
epochs: 30
batch_size: 64
lr: 0.001
weight_decay: 0.0001
seed: 0
device: cpu
out_dir: runs/gan_signals/robustness
